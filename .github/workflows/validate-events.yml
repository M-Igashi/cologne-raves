name: Validate JSON files

on:
  pull_request:
    paths:
      - 'data/**/*.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate JSON files against schema
        run: |
          for file in data/*.json; do
            echo "Validating $file"
            ajv validate -s event.schema.json -d "$file" --strict=false
          done

      # Build step removed - PR validation should only validate JSON files
      # Deployment builds are handled by the main branch deploy workflow
