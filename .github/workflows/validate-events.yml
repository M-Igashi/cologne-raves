name: Validate JSON files

on:
  pull_request:
    paths:
      - 'data/**/*.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate JSON files against schema
        run: |
          for file in data/*.json; do
            echo "Validating $file"
            ajv validate -s event.schema.json -d "$file" --strict=false
          done

      # Build step removed - PR validation should only validate JSON files
      # Deployment builds are handled by the main branch deploy workflow
