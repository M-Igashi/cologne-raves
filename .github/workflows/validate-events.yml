name: Validate JSON files

on:
  pull_request:
    paths:
      - 'data/**/*.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate JSON files against schema
        run: |
          for file in data/*.json; do
            echo "Validating $file"
            ajv validate -s event.schema.json -d "$file" --strict=false
          done

      # Build step removed - PR validation should only validate JSON files
      # Deployment builds are handled by the main branch deploy workflow
