name: Create Event PR

on:
  workflow_dispatch:
    inputs:
      events_json:
        description: 'JSON string of events data'
        required: true
        type: string
      filename:
        description: 'Filename for the JSON file'
        required: true
        type: string
      submitter_email:
        description: 'Email of the submitter (optional)'
        required: false
        type: string
        default: 'anonymous'

permissions:
  contents: read

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '22'

    - name: Create branch name
      id: branch
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        BRANCH_NAME="event-submission-${TIMESTAMP}"
        echo "name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

    - name: Create new branch
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "GitHub Actions Bot"
        git checkout -b ${{ steps.branch.outputs.name }}

    - name: Create event file
      env:
        EVENTS_JSON: ${{ inputs.events_json }}
        FILENAME: ${{ inputs.filename }}
      run: |
        printf '%s' "$EVENTS_JSON" | jq '.' > "data/$FILENAME"

    - name: Validate JSON format
      env:
        FILENAME: ${{ inputs.filename }}
      run: |
        if ! jq empty "data/$FILENAME"; then
          echo "Invalid JSON format"
          exit 1
        fi

    - name: Validate events
      env:
        FILENAME: ${{ inputs.filename }}
      run: |
        echo "Validating events..."
        node -e "
        const fs = require('fs');
        const events = JSON.parse(fs.readFileSync('data/' + process.env.FILENAME, 'utf8'));

        // Basic validation
        if (!Array.isArray(events)) {
          console.error('Events must be an array');
          process.exit(1);
        }

        events.forEach((event, index) => {
          // Check required fields (ID is optional for new events)
          const required = ['title', 'venue', 'date', 'startTime'];
          const missing = required.filter(field => !event[field]);

          if (missing.length > 0) {
            console.error(\`Event \${index + 1} missing required fields: \${missing.join(', ')}\`);
            process.exit(1);
          }

          // Validate date format (YYYY-MM-DD)
          if (!/^\d{4}-\d{2}-\d{2}$/.test(event.date)) {
            console.error(\`Event \${index + 1} has invalid date format: \${event.date}\`);
            process.exit(1);
          }

          // Validate time format (HH:MM)
          if (!/^\d{2}:\d{2}$/.test(event.startTime)) {
            console.error(\`Event \${index + 1} has invalid time format: \${event.startTime}\`);
            process.exit(1);
          }

          // Validate artists array if present
          if (event.artists && !Array.isArray(event.artists)) {
            console.error(\`Event \${index + 1} artists must be an array\`);
            process.exit(1);
          }
        });

        console.log('All events validated successfully!');
        "

    - name: Commit changes
      env:
        FILENAME: ${{ inputs.filename }}
        SUBMITTER_EMAIL: ${{ inputs.submitter_email }}
      run: |
        git add "data/$FILENAME"
        git commit -m "Add events: $FILENAME

        Submitted by: $SUBMITTER_EMAIL
        Timestamp: $(date -u +%Y-%m-%d' '%H:%M:%S' UTC')"

    - name: Push branch
      run: |
        git push origin ${{ steps.branch.outputs.name }}

    - name: Create labels if they don't exist
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        gh label create "event-submission" \
          --description "Event submission from web form" \
          --color "0e8a16" \
          --force || echo "Label 'event-submission' already exists"

        gh label create "automated" \
          --description "Automatically created" \
          --color "0052cc" \
          --force || echo "Label 'automated' already exists"

    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        FILENAME: ${{ inputs.filename }}
        SUBMITTER_EMAIL: ${{ inputs.submitter_email }}
      run: |
        TIMESTAMP="$(date -u +%Y-%m-%d' '%H:%M:%S' UTC')"
        gh pr create \
          --head "${{ steps.branch.outputs.name }}" \
          --base main \
          --title "New Events: ${FILENAME}" \
          --label "event-submission,automated" \
          --body "## New Event Submission

        **File:** \`data/${FILENAME}\`
        **Submitted by:** ${SUBMITTER_EMAIL}
        **Timestamp:** ${TIMESTAMP}

        ### Events Summary
        This PR adds new events from the web form submission.

        ### Validation Status
        - JSON format validated
        - Required fields present
        - Date/time formats correct

        ### Review Checklist
        - [ ] Event information looks correct
        - [ ] No duplicate events
        - [ ] Venues are spelled correctly
        - [ ] Dates are in the future

        ### Event Data
        Check the file \`data/${FILENAME}\` for the complete event data.

        ---
        *This PR was automatically created from a form submission at https://cologne.ravers.workers.dev/form/*"

        echo "Pull request created successfully!"
