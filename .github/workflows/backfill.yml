name: backfill

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/*.json'
  pull_request:
    paths:
      - 'data/*.json'

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # Fetch full history for Git timestamp-based processing

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Run backfill script
        run: node scripts/backfill-id.js

      - name: Commit & Push changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: backfill missing IDs"
            git push "https://x-access-token:${GH_PAT}@github.com/${REPO}.git" HEAD:main
            echo "Changes pushed - main deploy workflow will handle deployment"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Check if any files were modified
            const { execSync } = require('child_process');
            const diffOutput = execSync('git diff --name-only data/*.json').toString().trim();

            if (diffOutput) {
              const modifiedFiles = diffOutput.split('\n');
              const comment = `**ID Backfill Bot**\n\nI've added missing IDs to the following files:\n${modifiedFiles.map(f => `- \`${f}\``).join('\n')}\n\nPlease review the changes.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
