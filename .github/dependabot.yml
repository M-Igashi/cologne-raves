version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm_and_yarn:
        patterns:
          - "*"
    # Astro 7 requires Vite 8, which conflicts with the Vite 7 pin in the
    # toolchain. Block Astro major bumps until the ecosystem catches up.
    ignore:
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/cloudflare"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/react"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
